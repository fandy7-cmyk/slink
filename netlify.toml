[build]
  publish = "public"
  functions = "netlify/functions"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/admin"
  to = "/admin.html"
  status = 200

# ── /:slug → function redirect (bundle ATAU short link) ──
# bundle.html di-serve langsung dari function kalau slug cocok bundle
# Static files (favicon.png, bg.jpg, dll) tidak terpengaruh
[[redirects]]
  from = "/:slug"
  to = "/.netlify/functions/redirect/:slug"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[functions]
  node_bundler = "esbuild"