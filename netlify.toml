[build]
  publish = "public"
  functions = "netlify/functions"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/admin"
  to = "/admin.html"
  status = 200

[[redirects]]
  from = "/bundle/*"
  to = "/bundle.html"
  status = 200

# ── SHORT LINK REDIRECT ──────────────────────────────
# Di bawah semua route spesifik, di atas catch-all SPA
# Static files (favicon.png, dll) tidak terpengaruh karena Netlify
# prioritaskan file statis yang benar-benar ada sebelum redirect rules
[[redirects]]
  from = "/:slug"
  to = "/.netlify/functions/redirect/:slug"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[functions]
  node_bundler = "esbuild"
