<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BSLINK DINKESPPKB</title>
  <meta name="description" content="Kumpulan link dari Dinas Kesehatan PPKB Kab. Banggai Laut" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="apple-touch-icon" href="/favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --hijau:       #0077B6;
      --hijau-mid:   #00B4D8;
      --hijau-light: #e0f4f8;
      --emas:        #48CAE4;
      --emas-light:  #eaf9fc;
      --putih:       #ffffff;
      --abu-1:       #f0f8fb;
      --abu-2:       #d0ecf3;
      --teks:        #0d2d3a;
      --teks-mid:    #2a6070;
      --teks-muted:  #6a9aaa;
      --shadow-sm:   0 1px 4px rgba(0,119,182,.08);
      --shadow-md:   0 4px 20px rgba(0,119,182,.14);
      --radius:      14px;
      --radius-sm:   8px;
      --transition:  .22s cubic-bezier(.4,0,.2,1);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: url('/bg.jpg') center center / cover fixed no-repeat;
      color: var(--teks);
      min-height: 100vh;
    }
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background: linear-gradient(135deg, rgba(0,119,182,.80) 0%, rgba(0,180,216,.75) 50%, rgba(0,137,77,.78) 100%);
      pointer-events: none;
    }
    .page-wrap {
      position: relative; z-index: 1;
      max-width: 600px;
      margin: 0 auto;
      padding: 40px 16px 80px;
    }

    /* ── HEADER ─────────── */
    .bundle-header {
      text-align: center;
      margin-bottom: 32px;
      animation: fadeDown .5s ease both;
    }
    .back-link {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: .8rem; color: var(--teks-muted); text-decoration: none;
      font-weight: 600; margin-bottom: 20px;
      padding: 6px 12px; border-radius: 999px;
      background: var(--putih); border: 1.5px solid var(--abu-2);
      transition: all var(--transition);
    }
    .back-link:hover { color: var(--hijau); border-color: var(--hijau); }

    .bundle-icon {
      width: 72px; height: 72px;
      background: var(--hijau-light);
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      font-size: 32px;
      margin: 0 auto 16px;
      box-shadow: var(--shadow-md);
      border: 3px solid rgba(0,119,182,.12);
    }
    .bundle-title {
      font-size: 1.4rem;
      font-weight: 800;
      color: #ffffff;
      line-height: 1.3;
      margin-bottom: 8px;
      text-shadow: 0 1px 6px rgba(0,0,0,.2);
    }
    .bundle-desc {
      font-size: .88rem;
      color: rgba(255,255,255,.85);
      line-height: 1.6;
      max-width: 420px;
      margin: 0 auto;
    }
    .bundle-meta {
      display: flex; align-items: center; justify-content: center; gap: 12px;
      margin-top: 14px;
    }
    .meta-badge {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: .75rem; font-weight: 600;
      color: var(--hijau);
      background: var(--hijau-light);
      padding: 4px 12px; border-radius: 999px;
    }

    /* ── SHARE BAR ──────── */
    .share-bar {
      display: flex; align-items: center; gap: 8px;
      background: rgba(255,255,255,.82);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1.5px solid rgba(255,255,255,.7);
      border-radius: var(--radius);
      padding: 10px 14px;
      margin-bottom: 24px;
      animation: fadeUp .4s .1s ease both;
    }
    .share-url {
      flex: 1;
      font-family: 'DM Mono', monospace;
      font-size: .78rem;
      color: var(--teks-mid);
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }
    .btn-copy {
      padding: 6px 14px; border-radius: var(--radius-sm);
      background: var(--hijau-light); color: var(--hijau);
      border: none; font-family: inherit; font-size: .8rem;
      font-weight: 700; cursor: pointer;
      transition: all var(--transition); white-space: nowrap;
    }
    .btn-copy:hover { background: var(--hijau); color: #fff; }
    .btn-copy.copied { background: var(--hijau); color: #fff; }

    /* ── ITEM LIST ──────── */
    .items-list {
      display: flex; flex-direction: column; gap: 10px;
      animation: fadeUp .4s .15s ease both;
    }
    .item-card {
      display: flex; align-items: center; gap: 14px;
      background: rgba(255,255,255,.82);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-radius: var(--radius);
      padding: 14px 18px;
      box-shadow: 0 2px 12px rgba(0,0,0,.08);
      border: 1.5px solid rgba(255,255,255,.7);
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      transition: all var(--transition);
      position: relative;
      overflow: hidden;
    }
    .item-card::before {
      content: '';
      position: absolute; left: 0; top: 0; bottom: 0;
      width: 3px;
      background: var(--hijau);
      opacity: 0;
      transition: opacity var(--transition);
    }
    .item-card:hover {
      background: rgba(255,255,255,.95);
      border-color: rgba(255,255,255,.95);
      box-shadow: 0 6px 24px rgba(0,0,0,.14);
      transform: translateX(3px);
    }
    .item-card:hover::before { opacity: 1; }

    .item-icon {
      width: 42px; height: 42px; flex-shrink: 0;
      border-radius: 10px;
      background: var(--hijau-light);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }
    .item-body { flex: 1; min-width: 0; }
    .item-title {
      font-weight: 700; font-size: .92rem;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      color: var(--teks);
    }
    .item-desc {
      font-size: .76rem; color: var(--teks-muted);
      margin-top: 2px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .item-arrow {
      color: var(--teks-muted); font-size: 1rem; flex-shrink: 0;
      transition: transform var(--transition);
    }
    .item-card:hover .item-arrow { transform: translateX(3px); color: var(--hijau); }

    /* ── EMPTY / ERROR ──── */
    .state-box {
      text-align: center; padding: 60px 20px;
      color: var(--teks-muted);
    }
    .state-box .emoji { font-size: 48px; margin-bottom: 14px; }
    .state-box h2 { font-size: 1.1rem; font-weight: 700; color: var(--teks); margin-bottom: 8px; }
    .state-box p { font-size: .88rem; line-height: 1.6; }

    /* ── FOOTER ─────────── */
    .brand-footer {
      display: flex; flex-direction: column; align-items: center;
      gap: 6px; margin-top: 40px;
      opacity: .5;
    }
    .brand-footer img { height: 32px; width: auto; }
    .brand-footer span { font-size: .7rem; color: var(--teks-muted); }

    /* ── SKELETON ───────── */
    .skeleton {
      background: linear-gradient(90deg, var(--abu-2) 25%, var(--abu-1) 50%, var(--abu-2) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 8px;
    }
    @keyframes shimmer { from { background-position: 200% 0; } to { background-position: -200% 0; } }

    /* ── ANIMATIONS ─────── */
    @keyframes fadeDown { from { opacity:0; transform:translateY(-12px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeUp   { from { opacity:0; transform:translateY(12px);  } to { opacity:1; transform:translateY(0); } }

    /* ── TOAST ──────────── */
    #toastContainer {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      z-index: 9999; display: flex; flex-direction: column; gap: 8px;
      align-items: center; pointer-events: none;
    }
    .toast {
      background: var(--teks); color: #fff;
      padding: 11px 22px; border-radius: 999px;
      font-size: .85rem; font-weight: 600;
      box-shadow: 0 4px 24px rgba(0,0,0,.2);
      animation: toastIn .28s ease both;
      white-space: nowrap; max-width: 90vw; text-align: center;
    }
    .toast.success { background: var(--hijau); }
    @keyframes toastIn  { from { opacity:0; transform:translateY(14px) scale(.95); } to { opacity:1; transform:translateY(0) scale(1); } }
    @keyframes toastOut { from { opacity:1; } to { opacity:0; transform:translateY(6px) scale(.95); } }

    @media (max-width: 480px) {
      .page-wrap { padding: 24px 12px 60px; }
      .bundle-title { font-size: 1.2rem; }
    }
  </style>
</head>
<body>
<div class="page-wrap">

  <!-- BACK + HEADER -->
  <div class="bundle-header" id="bundleHeader">
    <a href="/" class="back-link">← Kembali ke Superlink</a>
    <div id="headerContent">
      <!-- diisi JS -->
      <div class="bundle-icon skeleton" style="width:72px;height:72px;margin:0 auto 16px"></div>
      <div class="skeleton" style="height:22px;width:60%;margin:0 auto 10px;border-radius:8px"></div>
      <div class="skeleton" style="height:14px;width:80%;margin:0 auto;border-radius:6px"></div>
    </div>
  </div>

  <!-- SHARE BAR -->
  <div class="share-bar" id="shareBar" style="display:none">
    <span class="share-url" id="shareUrl"></span>
    <button class="btn-copy" id="btnCopy">📋 Salin</button>
  </div>

  <!-- ITEMS -->
  <div id="itemsContainer">
    <!-- skeleton items -->
    <div class="items-list">
      <div style="display:flex;align-items:center;gap:14px;background:var(--putih);border-radius:var(--radius);padding:14px 18px;box-shadow:var(--shadow-sm)">
        <div class="skeleton" style="width:42px;height:42px;border-radius:10px;flex-shrink:0"></div>
        <div style="flex:1"><div class="skeleton" style="height:14px;width:70%;margin-bottom:8px;border-radius:6px"></div><div class="skeleton" style="height:10px;width:45%;border-radius:6px"></div></div>
      </div>
      <div style="display:flex;align-items:center;gap:14px;background:var(--putih);border-radius:var(--radius);padding:14px 18px;box-shadow:var(--shadow-sm)">
        <div class="skeleton" style="width:42px;height:42px;border-radius:10px;flex-shrink:0"></div>
        <div style="flex:1"><div class="skeleton" style="height:14px;width:55%;margin-bottom:8px;border-radius:6px"></div><div class="skeleton" style="height:10px;width:40%;border-radius:6px"></div></div>
      </div>
      <div style="display:flex;align-items:center;gap:14px;background:var(--putih);border-radius:var(--radius);padding:14px 18px;box-shadow:var(--shadow-sm)">
        <div class="skeleton" style="width:42px;height:42px;border-radius:10px;flex-shrink:0"></div>
        <div style="flex:1"><div class="skeleton" style="height:14px;width:65%;margin-bottom:8px;border-radius:6px"></div><div class="skeleton" style="height:10px;width:35%;border-radius:6px"></div></div>
      </div>
    </div>
  </div>

  <!-- BRAND FOOTER -->
  <div class="brand-footer">
    <img src="/favicon.png" alt="Superlink" />
    <span>Powered by Superlink · Dinkes PPKB Kab. Banggai Laut</span>
  </div>
</div>

<div id="toastContainer"></div>

<script>
function esc(str) {
  return String(str||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function toast(msg, type='success') {
  const c = document.getElementById('toastContainer');
  const t = document.createElement('div');
  t.className = 'toast ' + type;
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(() => { t.style.animation='toastOut .3s ease forwards'; setTimeout(()=>t.remove(),300); }, 2500);
}

// ── Ambil slug dari path: /bundle/SLUG ───────────────
const slug = location.pathname.replace(/.*\/bundle\//, '').replace(/\/$/, '');

if (!slug) {
  document.getElementById('headerContent').innerHTML = `
    <div class="state-box">
      <div class="emoji">🔗</div>
      <h2>Bundle tidak ditemukan</h2>
      <p>Alamat bundle tidak valid.</p>
    </div>`;
  document.getElementById('itemsContainer').innerHTML = '';
} else {
  loadBundle(slug);
}

async function loadBundle(slug) {
  try {
    const r = await fetch(`/api/bundles/${slug}`);
    if (!r.ok) {
      document.getElementById('headerContent').innerHTML = `
        <div class="state-box">
          <div class="emoji">😕</div>
          <h2>Bundle tidak ditemukan</h2>
          <p>Link bundle mungkin sudah tidak aktif atau alamatnya salah.</p>
        </div>`;
      document.getElementById('itemsContainer').innerHTML = '';
      return;
    }
    const { bundle, items } = await r.json();

    // Update page title & meta
    document.title = `${bundle.judul} – Superlink`;

    // Render header
    document.getElementById('headerContent').innerHTML = `
      <div class="bundle-icon">📦</div>
      <div class="bundle-title">${esc(bundle.judul)}</div>
      ${bundle.deskripsi ? `<div class="bundle-desc">${esc(bundle.deskripsi)}</div>` : ''}
      <div class="bundle-meta">
        <span class="meta-badge">🔗 ${items.length} link</span>
      </div>`;

    // Share bar
    const shareUrl = `${location.origin}/bundle/${bundle.slug}`;
    document.getElementById('shareUrl').textContent = shareUrl;
    document.getElementById('shareBar').style.display = 'flex';
    document.getElementById('btnCopy').addEventListener('click', () => {
      navigator.clipboard.writeText(shareUrl).then(() => {
        const btn = document.getElementById('btnCopy');
        btn.textContent = '✓ Tersalin!';
        btn.classList.add('copied');
        toast('Link bundle berhasil disalin!');
        setTimeout(() => { btn.textContent = '📋 Salin'; btn.classList.remove('copied'); }, 2000);
      });
    });

    // Render items
    if (!items.length) {
      document.getElementById('itemsContainer').innerHTML = `
        <div class="state-box">
          <div class="emoji">📭</div>
          <h2>Bundle masih kosong</h2>
          <p>Belum ada link yang ditambahkan ke bundle ini.</p>
        </div>`;
      return;
    }

    document.getElementById('itemsContainer').innerHTML = `
      <div class="items-list">
        ${items.map((item, i) => `
          <a class="item-card" href="${esc(item.url)}" target="_blank" rel="noopener"
             style="animation-delay:${i * 0.05}s">
            <div class="item-icon">${esc(item.ikon || '🔗')}</div>
            <div class="item-body">
              <div class="item-title">${esc(item.judul)}</div>
              ${item.deskripsi ? `<div class="item-desc">${esc(item.deskripsi)}</div>` : ''}
            </div>
            <div class="item-arrow">›</div>
          </a>`).join('')}
      </div>`;

  } catch (err) {
    console.error(err);
    document.getElementById('headerContent').innerHTML = `
      <div class="state-box">
        <div class="emoji">⚠️</div>
        <h2>Gagal memuat bundle</h2>
        <p>Terjadi kesalahan koneksi. Coba muat ulang halaman.</p>
      </div>`;
    document.getElementById('itemsContainer').innerHTML = '';
  }
}
</script>
</body>
</html>
